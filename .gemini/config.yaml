$schema:

have_fun: false

ignore_patterns:
  - node_modules/**
  - .next/**
  - .git/**
  - "*.lock"
  - "*.map"
  - prisma/*.db
  - .env.local
  - .env*.local
  - coverage/**
  - dist/**
  - build/**

memory_config:
  disabled: false

code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: -1
  pull_request_opened:
    help: false
    summary: true
    code_review: true
    include_drafts: true