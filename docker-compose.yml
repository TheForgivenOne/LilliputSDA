version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: lilliput_dev
    environment:
      POSTGRES_USER: lilliput
      POSTGRES_PASSWORD: lilliput
      POSTGRES_DB: lilliput_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lilliput -d lilliput_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: