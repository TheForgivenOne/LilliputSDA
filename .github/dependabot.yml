version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    target-branch: "develop"
    labels:
      - "dependencies"
    versioning-strategy: "increase"
    open-pull-requests-limit: 20
    reviewers:
      - "TheForgivenOne"
    assignees:
      - "TheForgivenOne"
    cooldown:
      default-days: 3
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      nextjs:
        patterns:
          - "next"
          - "@next/*"
          - "eslint-config-next"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "playwright"
          - "@playwright/*"
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
      framer-motion:
        patterns:
          - "framer-motion"
      hono:
        patterns:
          - "hono"
          - "@hono/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    target-branch: "develop"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
