name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore: ["**.md", "docs/**", "**.png", "**.svg", "**.jpg", "**.ico"]
  pull_request:
    branches: [main, develop]
    paths-ignore: ["**.md", "docs/**", "**.png", "**.svg", "**.jpg", "**.ico"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - name: Generate Next.js type declarations
        run: |
          if [ ! -f next-env.d.ts ]; then
            echo '/// <reference types="next" />' > next-env.d.ts
            echo '/// <reference types="next/image-types/global" />' >> next-env.d.ts
          fi
      - run: bun run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: bun run test:coverage
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run build
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          NEXT_PUBLIC_SITE_URL: https://lilliputsda.org

  db-setup:
    name: Database Setup
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Push database schema
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL not set — skipping db push"
            exit 0
          fi
          bunx prisma db push --accept-data-loss
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  cross-browser-tests:
    name: Cross-Browser Tests (${{ matrix.browser }})
    needs: [build, db-setup]
    if: needs.db-setup.result == 'success' || needs.db-setup.result == 'skipped'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
      max-parallel: 2
    runs-on: ${{ matrix.browser == 'webkit' && 'macos-latest' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Check secrets
        id: check
        run: |
          if [ -z "$DATABASE_URL" ] || [ -z "$AUTH_SECRET" ]; then
            echo "Required secrets not set — skipping cross-browser tests"
            exit 0
          fi
          echo "has-secrets=true" >> $GITHUB_OUTPUT
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      - run: bunx playwright install --with-deps ${{ matrix.browser }}
        if: steps.check.outputs.has-secrets == 'true'
      - run: bun run build
        if: steps.check.outputs.has-secrets == 'true'
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          NEXT_PUBLIC_SITE_URL: https://lilliputsda.org
      - run: bunx playwright test tests/e2e --project=${{ matrix.browser }} --retries=2
        if: steps.check.outputs.has-secrets == 'true'
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: http://localhost:3000
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_URL: http://localhost:3000
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          NEXT_PUBLIC_SITE_URL: https://lilliputsda.org
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 7

  deploy:
    name: Deploy to Vercel
    needs: cross-browser-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not set — skipping deploy"
            exit 0
          fi
          npx vercel deploy --prod --token="$VERCEL_TOKEN" --yes
