name: Auto Fix

on:
  workflow_run:
    workflows:
      - CI
      - Cross-Browser Tests
      - Dependabot Updates
    types:
      - completed

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  fix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Create issue for failed workflow
        id: create-issue
        uses: actions/github-script@v6
        with:
          script: |
            const workflow = context.payload.workflow_run;
            const repo = context.repo;
            const title = "\u{1F6A8} Fix failing workflow: " + workflow.name;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: repo.owner,
              repo: repo.repo,
              state: "open",
              labels: "opencode-fix",
            });

            const existing = issues.find(i => i.title === title);

            if (existing) {
              const body = existing.body + "\n\n---\nAnother failure on `" + workflow.head_branch + "` \u2014 [View run](" + workflow.html_url + ")";
              await github.rest.issues.update({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: existing.number,
                body,
              });
              console.log("Updated existing issue #" + existing.number);
              core.setOutput("issue-number", existing.number.toString());
            } else {
              const body = "Workflow **" + workflow.name + "** failed on branch `" + workflow.head_branch + "`.\n\n[View run](" + workflow.html_url + ")\n\nTriggered by: " + workflow.event + "\nCommit: " + workflow.head_commit.message;
              const issue = await github.rest.issues.create({
                owner: repo.owner,
                repo: repo.repo,
                title,
                body,
                labels: ["opencode-fix"],
              });
              console.log("Created issue #" + issue.data.number);
              core.setOutput("issue-number", issue.data.number.toString());
            }

      - name: Trigger opencode via workflow_dispatch
        run: |
          gh workflow run opencode.yml \
            --ref main \
            -f prompt="Fix the failing workflow: $(echo '${{ github.event.workflow_run.name }}')"
        env:
          GH_TOKEN: ${{ github.token }}
