name: Auto Fix

on:
  workflow_run:
    workflows:
      - CI
      - Cross-Browser Tests
      - Dependabot Updates
    types:
      - completed

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read

jobs:
  fix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Create issue for failed workflow
        id: create-issue
        uses: actions/github-script@v6
        with:
          script: |
            const workflow = context.payload.workflow_run;
            const repo = context.repo;
            const title = "\u{1F6A8} Fix failing workflow: " + workflow.name;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: repo.owner,
              repo: repo.repo,
              state: "open",
              labels: "opencode-fix",
            });

            const existing = issues.find(i => i.title === title);
            let issueNumber;

            if (existing) {
              const body = existing.body + "\n\n---\nAnother failure on `" + workflow.head_branch + "` \u2014 [View run](" + workflow.html_url + ")";
              await github.rest.issues.update({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: existing.number,
                body,
              });
              issueNumber = existing.number;
              console.log("Updated existing issue #" + existing.number);
            } else {
              const body = "Workflow **" + workflow.name + "** failed on branch `" + workflow.head_branch + "`.\n\n[View run](" + workflow.html_url + ")\n\nTriggered by: " + workflow.event + "\nCommit: " + workflow.head_commit.message;
              const issue = await github.rest.issues.create({
                owner: repo.owner,
                repo: repo.repo,
                title,
                body,
                labels: ["opencode-fix"],
              });
              issueNumber = issue.data.number;
              console.log("Created issue #" + issue.data.number);
            }

            core.setOutput("issue-number", issueNumber.toString());

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_ISSUE: ${{ steps.create-issue.outputs.issue-number }}
        with:
          model: opencode/deepseek-v4-flash-free
