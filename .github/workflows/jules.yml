name: Jules

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  jules:
    if: |
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'jules-fix') ||
      (github.event_name == 'issues' && github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'jules-fix')) ||
      (github.event_name == 'issue_comment' && (
        contains(github.event.comment.body, '/jules') ||
        startsWith(github.event.comment.body, '/jules')
      )) ||
      (github.event_name == 'pull_request_review_comment' && (
        contains(github.event.comment.body, '/jules') ||
        startsWith(github.event.comment.body, '/jules')
      ))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Jules
        run: |
          PROMPT="${{ github.event.issue.title || github.event.comment.body }}"
          curl -X POST 'https://jules.googleapis.com/v1alpha/sessions' \
            -H "Content-Type: application/json" \
            -H "X-Goog-Api-Key: ${{ secrets.JULES_API_KEY }}" \
            -d '{
              "prompt": "'"$PROMPT"'",
              "sourceContext": {
                "source": "sources/github/TheForgivenOne/LilliputSDA",
                "githubRepoContext": {
                  "startingBranch": "main"
                }
              },
              "automationMode": "AUTO_CREATE_PR",
              "title": "'"$PROMPT"'"
            }'