name: Bug Report
description: Report a bug to help us improve
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "## Bug Report"
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (site down, data loss)
        - High (feature broken)
        - Medium (minor issue)
        - Low (cosmetic)
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device / Browser
      description: e.g. iPhone 15 / Chrome 120
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      render: shell